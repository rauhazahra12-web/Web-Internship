<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In - Prism</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .auth-card {
      width: 100%;
      max-width: 420px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-header h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
    }

    .auth-header p {
      color: var(--text-light-secondary);
    }

    body.dark-mode .auth-header p {
      color: var(--text-dark-secondary);
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .form-input-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-input-group label {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .form-input-group input {
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-light);
      border-radius: 8px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.5);
      color: var(--text-light);
      transition: all 0.3s ease;
    }

    body.dark-mode .form-input-group input {
      background: rgba(30, 41, 59, 0.3);
      border-color: var(--border-dark);
      color: var(--text-dark);
    }

    .form-input-group input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1);
    }

    .submit-btn {
      padding: 0.875rem;
      background: linear-gradient(135deg, #7c3aed 0%, #06b6d4 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 16px rgba(124, 58, 237, 0.3);
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(124, 58, 237, 0.4);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .auth-link {
      text-align: center;
      margin-top: 1rem;
    }

    .auth-link p {
      color: var(--text-light-secondary);
      margin-bottom: 0.5rem;
    }

    body.dark-mode .auth-link p {
      color: var(--text-dark-secondary);
    }

    .auth-link a {
      color: var(--primary-color);
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .auth-link a:hover {
      color: var(--secondary-color);
    }

    .error-message {
      color: #ef4444;
      font-size: 0.9rem;
    }

    .success-message {
      color: #10b981;
      font-size: 0.9rem;
    }

    .demo-credentials {
      background: rgba(124, 58, 237, 0.1);
      border: 1px solid rgba(124, 58, 237, 0.3);
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    body.dark-mode .demo-credentials {
      background: rgba(124, 58, 237, 0.1);
      border-color: rgba(124, 58, 237, 0.4);
    }

    .demo-credentials strong {
      color: var(--primary-color);
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar-container container">
      <a href="/" class="logo">
        <span>◆</span>
        <span>Prism</span>
      </a>
      <ul class="nav-links">
        <li><button class="theme-toggle" id="theme-toggle">🌙</button></li>
      </ul>
    </div>
  </nav>

  <!-- Login Form -->
  <div class="auth-container">
    <div class="glass-card auth-card">
      <div class="auth-header">
        <h1>Welcome Back</h1>
        <p>Sign in to your Prism account</p>
      </div>

      <div class="demo-credentials">
        <strong>Demo Account:</strong><br>
        Email: demo@prism.com<br>
        Password: password123
      </div>

      <form class="auth-form" id="login-form">
        <div id="message"></div>

        <div class="form-input-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="you@example.com" 
            required
            autocomplete="email"
          >
        </div>

        <div class="form-input-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="••••••••" 
            required
            autocomplete="current-password"
          >
        </div>

        <button type="submit" class="submit-btn" id="submit-btn">
          Sign In
        </button>
      </form>

      <div class="auth-link">
        <p>Don't have an account? <a href="/signup">Create one</a></p>
      </div>
    </div>
  </div>

  <script src="js/main.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      // Validation
      if (!email || !password) {
        showMessage('Email and password required', 'error');
        return;
      }

      // Disable button during submission
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing In...';

      try {
        const response = await apiCall('/api/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });

        const data = await response.json();

        if (response.ok) {
          // Store auth data
          setAuth(data.token, data.userId, {
            name: data.name,
            email: data.email,
          });

          showMessage('Login successful! Redirecting...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard';
          }, 1000);
        } else {
          showMessage(data.error || 'Login failed', 'error');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Sign In';
        }
      } catch (error) {
        console.error('[v0] Login error:', error);
        showMessage('An error occurred. Please try again.', 'error');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });

    function showMessage(message, type) {
      messageDiv.className = type === 'success' ? 'alert alert-success' : 'alert alert-error';
      messageDiv.textContent = message;
      messageDiv.style.display = 'block';
      
      if (type === 'error') {
        setTimeout(() => {
          messageDiv.style.display = 'none';
        }, 4000);
      }
    }

    // Redirect if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      if (isAuthenticated()) {
        window.location.href = '/dashboard';
      }

      // Auto-fill demo account
      const demoButton = document.querySelector('.demo-credentials');
      if (demoButton) {
        demoButton.style.cursor = 'pointer';
        demoButton.addEventListener('click', () => {
          document.getElementById('email').value = 'demo@prism.com';
          document.getElementById('password').value = 'password123';
        });
      }
    });
  </script>
</body>
</html>
